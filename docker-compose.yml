services:
  php-app:
    container_name: php-app
    build: ./
    ports:
      - 8080:80
    volumes:
      - ./src/:/var/www/html/
    env_file:
      - .env
    depends_on:
      - mysql

  mysql:
    image: mysql:latest
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=project_php
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
    volumes:
      - mysql-data:/var/lib/mysql/

volumes:
  mysql-data:
